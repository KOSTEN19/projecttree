# Файл подключается в http: limit_req_zone / log_format — на уровне http

limit_req_zone $binary_remote_addr zone=perip:10m rate=25r/s;

log_format scanner '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent"';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    limit_req zone=perip burst=80 nodelay;
    limit_req_status 429;

    access_log /var/log/nginx/access.log combined;

    # Типичные пути сканеров — 444 + отдельный лог
    location ~* ^/(wp-admin|wp-login|wp-includes|wp-content/plugins|xmlrpc\.php|phpmyadmin|pma|phpMyAdmin|mysql|mysqladmin|administrator|vendor/phpunit|vendor/laravel|\.env(\.|$|/)|\.git|server-status|actuator|debug|telescope|graphql|\.DS_Store|\.git/config|setup\.php|install\.php|boaform|\.svn|cgi-bin|shell|eval-stdin\.php|thinkphp|phpinfo|cgi\.try|\.aws/credentials|id_rsa|\.ssh|admin\.php|manager/html|solr|jenkins|owa\.php|autodiscover|CSCOE|HNAP1|SDK/webLanguage|cgi-bin/luci|\.vscode|sitemap\.xml|\.htaccess|readme\.html|license\.txt) {
        access_log /var/log/nginx/scanners.log scanner;
        return 444;
    }

    location ~* ^/(\.env|\.git|\.svn|\.DS_Store|\.htaccess|web\.config|composer\.json|package-lock\.json|yarn\.lock)$ {
        access_log /var/log/nginx/scanners.log scanner;
        return 444;
    }

    location /api/ {
        proxy_pass http://server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
